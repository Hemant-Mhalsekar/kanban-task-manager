$kind: http-request
name: Register - Success
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test User",
      "email": "testuser@example.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Response has token field (string)", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("token");
          pm.expect(json.token).to.be.a("string");
      });

      pm.test("Response has user object with id, name, email", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("user");
          pm.expect(json.user).to.have.property("id");
          pm.expect(json.user).to.have.property("name");
          pm.expect(json.user).to.have.property("email");
      });

      pm.test("user.email equals testuser@example.com", function () {
          const json = pm.response.json();
          pm.expect(json.user.email).to.eql("testuser@example.com");
      });

      pm.test("user.name equals Test User", function () {
          const json = pm.response.json();
          pm.expect(json.user.name).to.eql("Test User");
      });

      pm.test("Password is NOT present in response", function () {
          const json = pm.response.json();
          pm.expect(json).to.not.have.property("password");
          pm.expect(json.user).to.not.have.property("password");
      });

      const json = pm.response.json();
      if (json.token) {
          pm.environment.set("authToken", json.token);
      }
      if (json.user && json.user.id) {
          pm.environment.set("userId", json.user.id);
      }
