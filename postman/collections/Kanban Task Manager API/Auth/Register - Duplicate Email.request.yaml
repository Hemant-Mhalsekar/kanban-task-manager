$kind: http-request
name: Register - Duplicate Email
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Another User",
      "email": "testuser@example.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response message mentions email already exists", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
          pm.expect(json.message.toLowerCase()).to.satisfy(function (msg) {
              return msg.includes("email") && (msg.includes("exists") || msg.includes("already") || msg.includes("taken") || msg.includes("registered") || msg.includes("duplicate"));
          });
      });
