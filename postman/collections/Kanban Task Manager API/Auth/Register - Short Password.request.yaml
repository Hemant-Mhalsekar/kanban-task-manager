$kind: http-request
name: Register - Short Password
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test User",
      "email": "shortpass@example.com",
      "password": "abc"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response message mentions password length", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
          pm.expect(json.message.toLowerCase()).to.satisfy(function (msg) {
              return msg.includes("password") && (msg.includes("length") || msg.includes("short") || msg.includes("characters") || msg.includes("least") || msg.includes("minimum"));
          });
      });
