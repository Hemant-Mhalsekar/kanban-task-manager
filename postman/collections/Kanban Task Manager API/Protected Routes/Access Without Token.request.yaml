$kind: http-request
name: Access Without Token
method: GET
url: '{{baseUrl}}/api/boards'
order: 1000
auth:
  type: noauth
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 401 or 404", function () {
          pm.expect(pm.response.code).to.be.oneOf([401, 404]);
      });

      pm.test("If 401: message mentions Not authorized or no token", function () {
          if (pm.response.code === 401) {
              const json = pm.response.json();
              pm.expect(json).to.have.property("message");
              pm.expect(json.message.toLowerCase()).to.satisfy(function (msg) {
                  return msg.includes("not authorized") || msg.includes("no token") || msg.includes("unauthorized") || msg.includes("token");
              });
          }
      });
