$kind: http-request
method: POST
url: '{{baseUrl}}/api/cards'
order: 5000
auth:
  type: noauth
body:
  type: json
  content: |-
    {
      "title": "Should fail"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 401", function () {
          pm.response.to.have.status(401);
      });

      pm.test("Response has message field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
      });

      pm.test("Response message includes 'not authorized' or 'no token'", function () {
          const json = pm.response.json();
          const msg = json.message.toLowerCase();
          pm.expect(msg.includes("not authorized") || msg.includes("no token")).to.be.true;
      });
