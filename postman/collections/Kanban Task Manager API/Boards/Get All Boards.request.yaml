$kind: http-request
name: Get All Boards
method: GET
url: '{{baseUrl}}/api/boards'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Implement when board routes are active
      pm.test("Status code is 200 or 404", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });
